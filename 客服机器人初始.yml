            \ = \"country_not_in_eu\"**，country 保留原值，is_complete 为 true。**此规则优先级最高，即使面值也满足其他违规条件，也仅标记此违规。**\n\
            \   - 如果属于欧盟，则：\n     - 对于 PSN卡：**将 country 字段的值设置为 \"欧盟\"**（不要保留原国家名）。\n\
            \     - 对于 Paysafe卡：如果国家属于以下例外列表（保加利亚、捷克、丹麦、希腊、匈牙利、波兰、葡萄牙、罗马尼亚、瑞典），则**保留原国家名**（不替换为“欧盟”）；否则（如德国、法国等）替换为“欧盟”。\n\
