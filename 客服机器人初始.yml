            face_value\": 数字,\n  \"country\": \"国家/null\",\n  \"card_prefix\": \"\
            卡号前4位/null\",\n  \"is_complete\": true/false,\n  \"missing_fields\": [],\n\
            \  \"next_question\": \"下一个问题/null\",\n  \"special_rule_violation\": \"\
            违规类型/null\"\n}\n\n# special_rule_violation 可选值\n- \"country_not_in_eu\"\
            : 用户给出的国家不属于欧盟（当使用欧元货币时）\n- \"paysafe_face_value_too_low\": 面值低于Paysafe卡对应国家的阈值\n\
            - \"razer_face_value_too_low\": 雷蛇卡面值过低\n- \"psn_face_value_too_low\"\
            : PSN卡面值过低\n- \"tw_apple_face_value_too_low\": 台湾苹果卡面值过低\n- \"hk_apple_face_value_too_low\"\
            : 香港苹果卡面值过低\n- \"jp_apple_face_value_too_low\": 日本苹果卡面值过低\n- \"ebay_country_not_us\"\
            : eBay卡国家不是美国\n- \"amex_prefix_invalid\": 美国运通卡号前缀无效\n- \"chime_face_value_too_low\"\
