          sephora\"]),\n        (\"香草卡\", [\"香草卡\", \"vanilla\"]),\n        (\"美国运通卡\"\
          , [\"美国运通卡\", \"运通卡\", \"amex\"]),\n        (\"PSN卡\", [\"psn卡\", \"psn\"\
          , \"playstation\"]),\n        (\"Apple Pay\", [\"apple pay\", \"applepay\"\
          ]),\n        (\"Chime\", [\"chime\"]),\n        (\"Paysafe卡\", [\"paysafe卡\"\
          , \"paysafe\"]),  # 修改为中文标准名，关键词包含小写\n    ]\n    query_lower = user_query.lower()\n\
          \    for standard_name, keywords in card_keywords:\n        for kw in keywords:\n\
          \            if kw.lower() in query_lower:  # 将关键词也转为小写\n              \
          \  return {\"card_name\": standard_name}\n    # 如果没有匹配任何卡名，默认苹果卡\n    return\
