            \ is this card for?\" 而不是中文。\n\n# 苹果卡子类型关键词（当用户指定时提取）\n- 实体卡：关键词 [\"实体卡\"\
            , \"实体\", \"physical\"]\n- 竖卡：关键词 [\"竖卡\", \"竖\", \"vertical\"]\n- 电子卡：关键词\
            \ [\"电子卡\", \"电子\", \"electronic\"]\n- 代码卡：关键词 [\"代码卡\", \"代码\", \"code\"\
            ]\n- 当用户输入中包含 “code”、“physical”、“vertical”、“electronic” 等英文词，且卡片类型为苹果卡时，应将其转换为对应的中文子类型（代码卡、实体卡、竖卡、电子卡），并填入\
            \ `card_subtype` 字段。\n\n【禁止】\n- 禁止计算报价、汇率、金额\n- 禁止输出“您询问了”或任何计算结果\n- 禁止添加任何解释、标点、注释等非\
            \ JSON 内容\n\n# 核心规则\n1. **绝对不要计算报价！**\n2. **只输出纯 JSON**，不要有任何额外文字。\n3.\
            \ 输出必须以 { 开头，以 } 结束。\n4. **只有当 card_type 或 face_value 缺失时，才设置 is_complete:\
