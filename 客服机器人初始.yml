          \        if country:\n            card_name = f\"{card_type} {country}\"\
          \n        else:\n            card_name = card_type\n\n    # 2. 转义单引号防止 SQL\
          \ 注入（安全）\n    card_name_escaped = card_name.replace(\"'\", \"''\")\n\n \
          \   # 3. 生成 SQL（仅根据 CardName 查询，面值匹配在后续代码中处理）\n    sql_query = f\"select\
          \ * from T_Rate where CardName = '{card_name_escaped}';\"\n\n    # 返回结果，包含原有的\
          \ query 和新生成的 sql_query\n    return {\n        \"query\": query,\n     \
          \   \"sql_query\": sql_query\n    }"
