            \   欧盟成员国完整列表（共27国）：奥地利、比利时、保加利亚、塞浦路斯、克罗地亚、捷克、丹麦、爱沙尼亚、芬兰、法国、德国、希腊、匈牙利、爱尔兰、意大利、拉脱维亚、立陶宛、卢森堡、马耳他、荷兰、波兰、葡萄牙、罗马尼亚、斯洛伐克、斯洛文尼亚、西班牙、瑞典。\n\
            \   Paysafe卡例外国家：保加利亚、捷克、丹麦、希腊、匈牙利、波兰、葡萄牙、罗马尼亚、瑞典。\n   Xbox卡例外国家：丹麦、瑞典、波兰、捷克、匈牙利。\n\
            \   注意：英国已脱欧，不属于欧盟；瑞士、挪威等不属于欧盟。\n   **对于 Steam 卡、雷蛇卡，不进行此验证（即不会标记 country_not_in_eu）。**\n\
            \n7. **欧元符号国家验证（针对苹果卡）**：**仅当用户输入中明确包含欧元符号 € 时**，才检查该国是否属于欧盟成员国。\n   -\
