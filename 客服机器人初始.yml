            ]\n- Chime：关键词 [\"chime\"]\n- Paysafe：关键词 [\"paysafe卡\", \"paysafe\",\
            \ \"paysafecard\"]\n\n- **语言要求**：当需要向用户提问时（即设置 `is_complete: false` 并提供\
