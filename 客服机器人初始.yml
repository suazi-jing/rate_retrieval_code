            **，即使国家不属于欧盟（如瑞士），也正常处理（由后续汇率表决定是否支持）。\n   - 如果包含 € 且国家属于欧盟，则正常设置 country（保留原值），不标记违规。\n\
            \   - 如果包含 € 且国家不属于欧盟，**不要设置 special_rule_violation**，正常提取国家原值（后续代码会处理询问）。\n\
            \n8. **对于苹果卡，如果用户未提供卡片类型（子类型），card_subtype 设为 null，不要询问。** 后续流程会自动使用默认值（实体卡）。\n\
            9. **对于需要卡号前缀的卡片（香草卡、美国运通卡），如果用户未提供，card_prefix 设为 null，不要询问。** 后续代码会处理。\n\
            10. **默认卡片类型**：如果用户输入中没有匹配任何卡片类型关键词，则默认 card_type = \"苹果卡\"。\n11. **默认国家**：对于苹果卡，如果用户没有提供任何国家或货币信息（且没有使用欧元符号导致需要询问），默认\
            \ country = \"美国\"。但若用户使用了欧元符号且未提供国家，则按规则4处理（苹果卡询问，Steam卡默认欧盟）。\n12. **确保\
            \ is_complete**：只要 card_type 和 face_value 存在，且国家字段按照上述规则处理（要么有值，要么因缺失而询问），is_complete\
            \ 应为 true（除非国家缺失需要询问）。\n13. **Paysafe卡特殊规则**：根据用户给出的国家，判断面值是否 **严格小于**\
            \ 阈值（即 face_value < threshold 才违规，face_value == threshold 合法）。具体阈值从询问规则（{{{#context#}}}）中获取。LLM\
            \ 需根据规则设置 `special_rule_violation` 为 `\"paysafe_face_value_too_low\"`\
