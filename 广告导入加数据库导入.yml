    - data:
        code: "import re\n\ndef main(full_text: str):\n    # ---------- 1. 提取群名 ----------\n\
          \    group_name = \"\"\n    # 匹配多种可能的群名行：“群名：xxx”、“真实群名：xxx”、“群名称: xxx”、“群组名：xxx”等\n\
          \    group_patterns = [\n        r'真实群名[：:]\\s*(.+)',\n        r'群名[：:]\\\
          s*(.+)',\n        r'群名称[：:]\\s*(.+)',\n        r'群组名[：:]\\s*(.+)',\n   \
          \     r'群组[：:]\\s*(.+)'\n    ]\n    for pattern in group_patterns:\n   \
          \     match = re.search(pattern, full_text)\n        if match:\n       \
          \     group_name = match.group(1).strip()\n            break\n\n    # ----------\
          \ 2. 逐行清理 ----------\n    lines = full_text.splitlines()\n    cleaned_lines\
          \ = []\n\n    for line in lines:\n        stripped = line.strip()\n    \
          \    if not stripped:\n            continue\n\n        # 删除纯分隔符行（如 ====\
          \ 或 ---- 或 ***）\n        if re.match(r'^[=\\-*_]{5,}$', stripped):\n   \
          \         continue\n\n        # 删除以“注：”、“注 ”、“#注”开头的全局注释行（保留行内#特殊信息）\n \
          \       if re.match(r'^(注[：:]|#注)', stripped):\n            continue\n\n\
          \        # 删除明显是纯注释的行（以#开头且不包含等号或括号或数字，避免误删行内#）\n        # 但注意像“#10=3.2”这种需要保留，所以只删除以#开头且整行没有数字、等号、括号的行\n\
          \        if stripped.startswith('#') and not re.search(r'[\\d=【\\]\\(\\\
          )]', stripped):\n            continue\n\n        # 删除仅包含“群名”关键字的行（已经提取过，避免干扰）\n\
          \        if re.match(r'^(群名|真实群名|群名称|群组名)[：:]', stripped):\n           \
          \ continue\n\n        # ---------- 3. 行内容规范化 ----------\n        # 将中文括号【】替换为普通括号或直接替换为等号？为了保留信息，将【xx】转换为=xx（但更简单：保留原样）\n\
          \        # 将全角～替换为-\n        line = line.replace('～', '-').replace('~',\
          \ '-')\n        # 将中文括号【】替换为 [] 便于后续正则，但最好保留原样（后续LLM可处理）\n        # 去除行首尾空格\n\
          \        line = line.strip()\n\n        # 特殊处理：某些格式如“10-49【7.11】50-500【7.26】”，可将其拆分为两个独立的“面值=汇率”形式。\n\
          \        # 识别连续两个【】的模式，将其拆成两个半行（但这里保持原样，让LLM解析更合适）\n        # 为了兼容性，我们不做拆分，保留原文本。\n\
          \n        # 将行内多个连续空格压缩成一个空格\n        line = re.sub(r'[ \\t]+', ' ', line)\n\
          \n        # 将全角逗号、分号等替换为英文（可选）\n        line = line.replace('；', ';').replace('，',\
          \ ',')\n\n        # 保留原样（包括#号，用于后续特殊解析）\n        cleaned_lines.append(line)\n\
          \n    # ---------- 4. 合并结果 ----------\n    text = \"\\n\".join(cleaned_lines)\n\
          \    # 合并连续空行（经过前面过滤，可能还有多个空行）\n    text = re.sub(r'\\n\\s*\\n', '\\n',\
          \ text).strip()\n\n    return {\n        \"cleaned_text\": text,\n     \
          \   \"group_name\": group_name\n    }"
