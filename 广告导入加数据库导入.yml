            \ 2.4 特殊规则\n- **苹果卡面值为50时**：方法只能是 **“快加”** 或 **“快刷”**，不能是“凑卡”或“慢加”。如果原文同时出现多种提示，按2.2.1优先级取第一个匹配到的有效方法。\n\
            - 方法关键词可能出现在行内任何位置（如行尾的“快加问”、行中的“快刷”等），需准确识别。\n\n\n## 三、特殊卡种处理规则\n\n###\
            \ 3.1 雷蛇卡特殊处理\n- **黄金雷蛇US**：若出现 `US: 1-499=5.73 批量问` 等形式，提取面值区间（如 `1-499`），**不添加倍数括号**（即直接写\
