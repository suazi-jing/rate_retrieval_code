            \ `【Apple 快刷】` 下的 `CAD 200-500=3.67` → 输出快刷，不是快加。\n\n#### 2.2.3 美国苹果卡和英国苹果卡的快加判断规则（强制执行）\n\
            \n**重要前提**：\n1. 本规则仅在 2.2.1 无匹配（行内没有快加/快刷/凑卡/慢卡关键词）**且标题无方法关键词**时才适用\n\
            2. 本规则对美国和英国苹果卡**强制执行**，不允许跳过\n3. **标题继承的方法（快加/快刷/凑卡/慢加）直接输出，不经过本规则判断**\n\
            \n**快加匹配规则（必须同时满足，缺一不可）：**\n\n| 条件编号 | 条件内容 |\n|----------|----------|\n\
