            - **对于英国苹果卡的“慢卡”处理（重要！）**：\n  - 当出现 `======UK慢卡===` 或 `======英国慢卡===`\
            \ 或任何包含 **“慢卡”** 的标题行时，该标题行下方的所有有效数据行**必须**使用 **“慢卡”** 作为方法。\n  - **慢卡仅适用于英国苹果卡**，其他国家出现“慢卡”关键词视为无效，忽略该行。\n\
            - **特别对于 Paysafe 卡部分**：任何出现在“注；”或“注：”之后的行，即使包含面值和汇率（例如 `EUR-15-49【6.1】`、`UK-\
            \ 50 以下【6.8】`），一律视为无效数据，忽略不输出。只有位于上方表格区域（以国家代码开头的行，如“欧盟 EUR 50-500==6.55”）才有效。\n\
            \n\n## 五、通用面值提取规则（适用于所有需要输出的卡种）\n\n### 5.1 有效格式识别与处理\n\n**第一步：按空格分割，提取所有“面值-汇率”候选对**\
            \  \n- 对于一行文本，先按空格拆分成多个子串（忽略卡名、地区等非数值部分）。\n- 每个子串如果包含 `=` 或 `【】`，视为一个候选对。\n\
            \n**第二步：解析每个候选对中的面值和汇率**  \n- **如果子串包含 `=`**：直接以 `=` 分隔，左边为面值部分，右边为汇率数字。\
            \  \n- **如果子串包含 `【】`**：提取 `【` 和 `】` 之间的数字作为汇率，`【` 之前的部分作为面值部分。  \n  示例：`10-250图密【5.25】`\
            \ → 面值部分 = `10-250图密`，汇率 = `5.25`。\n\n**第三步：清洗面值部分，提取有效的面值表达式**  \n- 从面值部分中去除卡类型关键词（如\
            \ `横白`、`电子`、`代码`、`图密`、`竖卡`）以及国家前缀（如 `US:`、`UK:`），只保留数字、`-`、`/`、`+` 等符号。\
            \  \n- 例如 `10-250图密` → 清洗后得 `10-250`；`100/150横白` → 清洗后得 `100/150`。\n\n\
            **第四步：解析清洗后的面值表达式**  \n- 如果表达式包含 `/`（如 `100/150`），则拆分为多个独立面值，每个单一面值一行，说明“精准匹配”。\
            \  \n- 如果表达式为 `数字-数字` 区间（如 `150-250`），则为区间格式，根据后续倍数规则处理。  \n- 如果表达式为 `数字-数字`\
            \ 但右边为小数（如 `100-5.05`），视为笔误，替换为 `数字=数字`，按单一面值处理。  \n- 如果表达式为纯数字（如 `100`），则为单一面值。\
            \  \n- 如果表达式包含 `+`（如 `20+`），则为“以上”格式，面值写 `20以上`。\n\n**第五步：确定方法**  \n-\
            \ 拆分出的每个记录，都继承原行所在段落的方法（默认方法或行内关键词指定的方法）。\n\n### 5.2 其他格式处理\n- **斜杠分割**：`数字/数字=汇率`\
            \ 按上述规则处理。\n- **单一面值**：`数字=汇率` 或 `数字+=汇率`，说明“精准匹配”。\n- **区间（带显式倍数）**：`数字-数字=汇率（X倍）`\
            \ 或 `数字-数字=汇率 X倍`，面值范围写 `最小-最大（X的倍数）`，说明“倍数匹配”。\n- **区间（带“问/快刷”字样）**：`数字-数字=汇率问`\
            \ 或 `数字-数字=汇率快刷`，面值范围写 `最小-最大（50的倍数）`，说明“倍数匹配”。\n- **区间（无倍数标识）**：`数字-数字=汇率`，面值范围写\
            \ `最小-最大`，说明“区间匹配”。\n\n### 5.3 汇率处理\n- 等号后面的数字（或 `【】` 中的数字），**保留原始小数位数**，不补零。\n\
            \n### 5.4 卡类型汇率偏移量处理规则\n\n**适用范围**：当一行出现\"卡类型关键词 + 偏移量\"的格式时（如\"竖卡-0.1\"\
            、\"电子卡+0.2\"），这不是一个独立的面值行，而是对**同一段落内上方已出现的面值行**的汇率调整说明。\n\n**识别规则**：\n\
            - 行中只有\"卡类型关键词\" + \"加减数字\"，**没有面值区间和等号**。\n- 例如：`竖卡-0.1`、`电子卡+0.2`、`代码卡-0.05`\n\
            - 卡类型关键词包括：竖卡、电子卡、代码卡、横白、卡图、白板等。\n\n**处理规则**：\n1. 该行**本身不输出任何记录**。\n2.\
            \ 该行表示：同一段落内，上方出现的所有面值行，在对应卡类型下，汇率在原基础上加减偏移量。\n3. 偏移量可能为正（+）或负（-），如 `-0.1`\
            \ 表示汇率减0.1，`+0.2` 表示汇率加0.2。\n4. 该规则只作用于**同一段落内、该偏移量行之前**出现的面值行（直到上一个卡类型偏移量行或段落标题）。\n\
            5. 如果偏移量行指定的卡类型与上方面值行中的卡类型关键词匹配，则该面值行的汇率需要调整。\n   - 例如上方是\"横白卡图\"，偏移量行是\"\
            竖卡-0.1\"，则竖卡版本的汇率 = 横白卡图汇率 - 0.1\n   - 如果偏移量行指定的卡类型在上方没有对应面值行，则忽略。\n\n\
            **示例**：\n输入：\n`横白卡图25-199=5.48`\n`竖卡-0.1`\n\n处理：\n- 横白卡图 25-199 → 汇率 5.48，输出白板卡\n\
            - 竖卡-0.1 → 表示竖卡版本：25-199 汇率 5.48-0.1=5.38，输出竖卡\n\n**重要**：\n- `竖卡-0.1`\
            \ 这种格式**不是有效面值行**，不输出\n- 只能根据上方已有面值行来派生对应卡类型的记录\n- 如果偏移量行上方有多个面值行，每个面值行都需要派生对应卡类型的记录\n\
            \n\n### 5.5 行内卡类型关键词作用域规则\n\n**规则**：当一行中出现卡类型关键词（横白、图密、电子、代码、竖卡、白板等）时，该关键词作用于**整行所有面值对**。\n\
            \n**处理方式**：\n1. 卡类型关键词在行中任意位置出现（行首、行中、行尾），均作用于整行。\n2. 如果一行中没有卡类型关键词，使用默认卡类型\
            \ **\"白板卡\"**。\n3. 如果一行中出现多个卡类型关键词，以**最后一个**为准。\n\n**示例**：\n输入：`US 20-90\
            \ 5倍 【5.1】图密 10/20【5.3】`\n- \"图密\"作用于整行\n- 三个面值对全部归为 **代码卡**：20-90、10、20\n\
            \n输入：`US 横白 100=5.5 电子 200=5.3`\n- \"电子\"是最后一个卡类型关键词\n- 两个面值对全部归为 **电子卡**：100、200\n\
            \n### 5.6 纯倍数格式处理（无明确面值区间）\n\n**格式**：当一行中只出现\"数字倍\"（如 `1000倍`、`50倍`），而没有明确的\
            \ `数字-数字` 面值区间时：\n\n**处理规则**：\n- 面值范围写为 `数字以上（数字的倍数）`\n- 例如：\n  - `1000倍`\
            \ → 面值范围 `1000以上（1000的倍数）`\n  - `50倍` → 面值范围 `50以上（50的倍数）`\n  - `5倍` →\
            \ 面值范围 `5以上（5的倍数）`\n\n**注意**：\n- 这与区间后面跟倍数不同（如 `10-250（5的倍数）`）\n- 纯倍数格式表示：起始面值\
            \ = 倍数数字，且面值必须是该倍数的整数倍\n\n### 5.7 \"图密同价\"规则\n\n**格式**：当一行中出现\"图密同价\"\
            或\"卡密同价\"时，需要根据上下文判断。\n\n**识别规则**：\n- `图密同价`：表示该行面值和汇率同时适用于白板卡和代码卡。\n\
            - `卡密同价`：表示代码卡同价，**但如果行内已经明确写了卡类型关键词（如\"卡密\"、\"图密\"、\"代码\"），则以该关键词为准，不额外派生**。\n\
            \n**处理规则**：\n1. 如果行内**没有**卡类型关键词：\n   - `图密同价` → 输出白板卡 + 代码卡两条记录\n   -\
            \ `卡密同价` → 输出白板卡 + 代码卡两条记录\n2. 如果行内**已有**卡类型关键词（如\"卡密\"、\"图密\"、\"代码\"\
            、\"横白\"、\"卡图\"等）：\n   - 以行内的卡类型关键词为准，**忽略**\"同价\"提示，只输出一条对应卡类型的记录。\n\n\
            **示例**：\n输入：`US 20=5.45 图密同价`（无卡类型关键词）\n输出：\n- 快加 苹果卡 美国 白板卡 20 5.45\n\
            - 快加 苹果卡 美国 代码卡 20 5.45\n\n输入：`法国卡密同价 100-250=5.21 50倍`（有\"卡密\"关键词）\n\
            输出：\n- 快加 苹果卡 法国 代码卡 100-250（50的倍数） 5.21\n（只输出一条，因为\"卡密\"本身就是代码卡）\n\n\
            输入：`CAD 25=3.85 图密同价`（无卡类型关键词）\n输出：\n- 快加 苹果卡 加拿大 白板卡 25 3.85\n- 快加 苹果卡\
            \ 加拿大 代码卡 25 3.85\n\n**核心原则**：\n- \"X同价\"只在行内没有明确卡类型时才生效\n- 如果行内已明确卡类型，以行内卡类型为准，不额外派生\n\
            \n## 六、输出格式（极其重要！）\n\n- **每个有效记录输出一行**，格式如下（标签之间无空格，严格按照顺序）：\n  {\"method\"\
            :\"方法\",\"cardname\":\"卡片名称\",\"value\":\"面值范围\",\"rate\":\"汇率\",\"Exolanation\"\
            :\"说明\",\"groupname\":\"群名\"}\n- **禁止输出任何额外解释文字、空行或分隔线**。\n- 多个记录直接连续输出。\n\
            \n**多行示例**：\n[\n  {\"method\":\"快刷\",\"cardname\":\"苹果卡 美国 白板卡\",\"value\"\
            :\"50\",\"rate\":\"5.6\",\"Exolanation\":\"精准匹配\",\"groupname\":\"S1999\"\
            },\n  {\"method\":\"快刷\",\"cardname\":\"苹果卡 美国 白板卡\",\"value\":\"100\"\
            ,\"rate\":\"5.78\",\"Exolanation\":\"精准匹配\",\"groupname\":\"S1999\"}\n\
            ]\n\n**示例**：\n- 输入：`US:200-500横白=5.66 50倍数`（苹果卡，横白，无方法关键词，面值200-500）\n\
            \  说明：美国苹果卡，无方法关键词，面值200-500不在快加列表中 → **禁止输出**\n  正确输出：（无输出）\n\n- 输入：`US:50横白快刷=5.55`（苹果卡，面值50，含“快刷”）\n\
            \  输出：[{\"method\":\"快刷\",\"cardname\":\"苹果卡 美国 白板卡\",\"value\":\"50\"\
            ,\"rate\":\"5.55\",\"Exolanation\":\"精准匹配\",\"groupname\":\"S1362\"}]\n\
            \n- 输入：`US:横白卡图10-190=5.7（5倍）`（苹果卡，无方法关键词，面值10-190在快加列表中，5倍）\n  输出：[{\"\
            method\":\"快加\",\"cardname\":\"苹果卡 美国 白板卡\",\"value\":\"10-190（5的倍数）\"\
            ,\"rate\":\"5.7\",\"Exolanation\":\"倍数匹配\",\"groupname\":\"S1362\"}]\n\
            \n- 输入：`【XBOX】US:10-250图密【5.25】`（Xbox卡，非苹果卡，默认快加）\n  输出：[{\"method\":\"\
            快加\",\"cardname\":\"苹果卡 美国 白板卡\",\"value\":\"10-190（5的倍数）\",\"rate\":\"\
            5.7\",\"Exolanation\":\"区间匹配\",\"groupname\":\"S1362\"}]\n\n- 输入：`卡图10-200=3.6（5倍）`（加拿大苹果卡，非美英，默认快加）\n\
            \  输出：[{\"method\":\"快加\",\"cardname\":\"苹果卡 加拿大 白板卡\",\"value\":\"10-200（5的倍数）\"\
            ,\"rate\":\"3.6\",\"Exolanation\":\"倍数匹配\",\"groupname\":\"S1362\"}]\n\
            \n## 七、重要提醒（必须遵守）\n- **必须输出输入中所有有效的面值区间，包括斜杠拆分产生的多个单一面值、所有不同金额的区间。**\n\
            - **同一卡片类型、同一面值范围、相同方法时，只保留汇率最高的行；不同方法即使卡名和面值相同，也必须分别输出。**\n  虽然卡名、面值范围相同，但方法不同（一个为“快刷”，一个为“凑卡”），因此两条记录都必须输出，不能合并或丢弃任一条。\n\
            - **不同卡类型（白板卡、电子卡、代码卡、竖卡）即使面值范围和方法相同，也必须分别输出，不得合并！** 例如：\n  - `苹果卡 加拿大\
            \ 代码卡 10-200` 和 `苹果卡 加拿大 白板卡 10-200` 是不同的卡类型，必须分别输出，不能只保留汇率最高的一个。\n- 绿蛇、Roblox\
            \ 相关内容一律忽略，不输出。\n- 黄金雷蛇卡的面值区间不写倍数括号（如 `1-499` 而不是 `1-499（50的倍数）`），说明仍为“区间匹配”。\n\
            - 外卡雷蛇卡无面值区间的“1以上”不写倍数括号。\n- Xbox卡外卡区域固定输出 `10-250（5的倍数）`。\n- Paysafe卡只输出表格区域的有效行，忽略“注；”后面的所有额外行。\n\
            - 苹果卡需要区分卡类型，其他卡不区分。\n- 必须遵守 四、忽略规则（不处理、不输出）\n- 必须遵守 三、特殊卡种处理规则\n- **必须为每条输出添加\
            \ \"Method\" 标签，且方法值根据规则二正确确定。**\n- **所有苹果卡的输出必须包含卡类型。如果原文未指定，默认使用“实体卡”。**\n\
            \n请严格按照上述规则输出，不要添加任何额外解释。"
