            \ 1倍` → ✅ 输出快加，面值标注（1的倍数）\n\n**标题继承示例（跳过2.2.3判断，直接输出）：**\n- 标题 `●iTunes-苹果快加`\
            \ + `US:1000-2000卡图=5.18（100倍）` → 标题包含\"快加\" → ✅ 直接输出快加\n- 标题 `【Apple-美国\
            \ 快刷1-3分钟】` + `US:200-500=5.8` → 标题包含\"快刷\" → ✅ 直接输出快刷\n- 标题 `iTunes-US快加`\
            \ + `US:25-495 电子图=5.3 (5倍)` → 标题包含\"快加\" → ✅ 直接输出快加\n- 标题 `iTunes-US快刷\
            \ (5-15min)` + `US:350-450 白卡=5.82(50倍)` → 标题包含\"快刷\" → ✅ 直接输出快刷\n\n**禁止输出的情况**（仅当标题无方法关键词时）：\n\
            - `1000-2000` → ❌ 超出10-500区间\n- `10-600 5倍` → ❌ 超出10-500区间\n- `5-300 50倍`\
            \ → ❌ 最小值小于10，不在10-500区间内\n\n**绝对禁止的行为（不允许有任何例外）：**\n- 禁止将超出10-500区间的面值判断为快加（仅当标题无方法关键词时）\n\
            - 禁止在无方法关键词且标题无方法关键词时为美国/英国苹果卡输出快刷或凑卡\n- **禁止在标题有方法关键词时仍进入2.2.3判断——标题继承的方法直接输出，跳过本规则所有判断**\n\
