            \n#### 2.2.2 根据国家确定默认方法（无行内关键词时）\n\n**注意：本规则仅在 2.2.1 规则不匹配（即行内没有任何方法关键词）时才生效。**\n\
            \n**优先级说明（强制执行）**：\n1. **最高优先级：行内方法关键词**（2.2.1）→ 直接使用\n2. **次优先级：标题方法继承**（2.2.0）→\
            \ 如果标题包含方法关键词（快刷、快加、凑卡、慢卡），该段落下所有无行内方法关键词的行**必须继承标题方法**，不再进入国家默认判断\n3.\
            \ **最低优先级：国家默认判断** → 仅当标题**没有方法关键词**且行内**没有方法关键词**时才执行\n\n| 国家 | 处理方式\
            \ |\n|------|----------|\n| 美国 | **必须**执行 2.2.3 判断，只有匹配快加规则才输出，否则**禁止输出**\
