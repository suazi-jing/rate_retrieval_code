            \ 1000-2000 | 100倍 | ❌ 禁止（超出10-500） |\n\n\n#### 2.2.4 快刷、凑卡的输出规则\n\n#####\
            \ 快刷判断（满足任一即可）\n- 行内明确包含 **\"快刷\"** 或 **\"极速\"** 关键词 → 输出快刷\n- 行内包含 **\"\
            极速网单\"** 且**段落注释无时间标注** → 归为**快刷**\n- 行内包含 **\"快网\"** 且**段落注释无时间标注** →\
            \ 归为**快刷**\n- 行内包含 **\"快速网单\"** 且**段落注释无时间标注** → 归为**快刷**\n\n##### 凑卡判断（满足任一即可）\n\
            - 行内明确包含 **\"凑卡\"** 或 **\"凑卡网单\"** 关键词 → 输出凑卡\n- 行内包含 **\"极速网单\"** 且**段落注释有时间标注**（如\
