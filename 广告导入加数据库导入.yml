            \ → 归为**凑卡**\n- 行内包含 **\"快速网单\"** 且**段落注释有时间标注** → 归为**凑卡**\n\n##### 判断优先级\n\
            1. 先检查行内是否有明确的\"快刷\"、\"凑卡\"、\"凑卡网单\"关键词（最高优先级）\n2. 再检查标题中的\"极速网单\"、\"\
            快网\"、\"快速网单\"，扫描段落注释判断时间标注\n   - 段落注释无时间标注 → 快刷\n   - 段落注释有时间标注 → 凑卡\n\
            \n#### 2.2.5 慢卡规则（仅英国苹果卡，美国苹果卡）\n- 只有行内明确包含 **“慢加”** 或 **“慢卡”或 **“慢”**\
